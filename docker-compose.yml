version: '3.8'

services:
  api:
    build: .
    container_name: smart-airport-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  dashboard:
    build: .
    container_name: smart-airport-aoip-1
    command: python app_aoip.py
    ports:
      - "8050:8050"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000