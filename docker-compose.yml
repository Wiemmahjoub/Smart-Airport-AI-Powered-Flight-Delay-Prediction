# docker-compose.yml
version: '3.8'

services:
  aoip:
    build: .
    ports:
      - "8050:8050"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8050')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s